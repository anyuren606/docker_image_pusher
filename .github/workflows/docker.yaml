name: Build and push image Aliyun

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Aliyun ACR
        run: |
          echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login \
            --username "${{ secrets.ALIYUN_REGISTRY_USER }}" \
            --password-stdin ${{ secrets.ALIYUN_REGISTRY }}

      - name: Pull, Tag and Push Images
        env:
          ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }} # 确保你在 Secrets 里配置了这个命名空间
        run: |
          # 检查 images.txt 是否存在
          if [ ! -f images.txt ]; then
            echo "Error: images.txt not found!"
            exit 1
          fi

          while IFS= read -r line || [ -n "$line" ]; do
            # 跳过空行
            if [ -z "$line" ]; then continue; fi
            
            echo "Processing: $line"
            
            # 提取镜像名和标签 (假设格式为 repo:tag)
            image_name_tag=$(echo "$line" | awk -F'/' '{print $NF}')
            
            # 构建新的目标地址
            # 注意：这里假设你的 Registry 地址不包含 https://，如果是，docker tag 可能会报错，需根据实际情况调整
            new_image="${{ secrets.ALIYUN_REGISTRY }}/${ALIYUN_NAME_SPACE}/${image_name_tag}"
            
            echo "Pulling $line ..."
            docker pull "$line"
            
            echo "Tagging $line as $new_image ..."
            docker tag "$line" "$new_image"
            
            echo "Pushing $new_image ..."
            docker push "$new_image"
            
          done < images.txt
